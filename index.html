<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>taeja87th | Tablet Showcase</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; height: 100vh; overflow: hidden; }

        /* 1. 컨테이너 레이아웃 */
        .container {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 100vh;
            transition: grid-template-columns 0.4s ease;
            position: relative;
        }
        .container.collapsed {
            grid-template-columns: 0px 1fr;
        }

        /* 2. 햄버거 버튼 (메뉴 외부로 분리) */
        .btn-toggle {
            position: absolute; top: 20px; left: 20px; /* 고정 위치 */
            width: 40px; height: 40px;
            background: #ff3c78; color: white;
            border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: left 0.4s ease;
        }
        .container.collapsed .btn-toggle { left: 20px; } /* 닫혀있어도 고정 */

        /* 3. 왼쪽 메뉴 */
        .left-side { 
            background: #ffffff; border-right: 1px solid #ddd; 
            overflow: hidden; position: relative;
        }
        .menu-content { width: 300px; padding: 80px 40px 40px 40px; } /* 상단에 버튼을 위한 패딩 추가 */

        .title { font-size: 20pt; font-weight: 800; margin-bottom: 30px; color: #1a1a1a; }
        .ui-item {
            padding: 15px; border-radius: 10px; margin-bottom: 12px;
            background: #f8f9fa; cursor: pointer; transition: 0.2s;
            border: 1px solid #eee;
        }
        .ui-item:hover, .ui-item.active { background: #fff1f5; border: 1px solid #ff3c78; }

        /* 4. 오른쪽 태블릿 영역 */
        .right-side { 
            display: flex; align-items: center; justify-content: center;
            padding: 40px; background-color: #e9ecef;
            overflow: hidden;
        }
        .tablet-frame {
            width: 100%; height: 100%;
            border: 15px solid #2d2d2d;
            border-radius: 30px;
            background: #fff;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .screen { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="container" id="container">
    <div class="btn-toggle" onclick="toggleMenu()">☰</div>

    <div class="left-side">
        <div class="menu-content">
            <div class="title">UI Showcase</div>
            <div class="ui-list">
                <div class="ui-item" onclick="loadUI(this, './Moeun-IOT/index.html')"><h3>Moeun-IOT</h3></div>
                <div class="ui-item" onclick="loadUI(this, 'https://example.com/demo2')"><h3>준비 중..</h3></div>
            </div>
        </div>
    </div>

    <div class="right-side">
        <div class="tablet-frame">
            <iframe id="frame" class="screen" src="about:blank"></iframe>
        </div>
    </div>
</div>

<script>
    function toggleMenu() {
        const container = document.getElementById('container');
        const btn = document.querySelector('.btn-toggle');
        container.classList.toggle('collapsed');
        
        // 버튼 텍스트 변경
        btn.innerHTML = container.classList.contains('collapsed') ? '➔' : '☰';
    }

    function loadUI(el, url) {
        document.querySelectorAll('.ui-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('frame').src = url;
    }
</script>
</body>
</html>
