<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>taeja87th | Tablet Showcase</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; height: 100vh; overflow: hidden; }

        /* 1. 그리드 레이아웃 (애니메이션 적용) */
        .container {
            display: grid;
            grid-template-columns: 300px 1fr; /* 펼쳤을 때 */
            height: 100vh;
            transition: grid-template-columns 0.3s ease;
        }
        .container.collapsed {
            grid-template-columns: 0px 1fr; /* 접었을 때 */
        }

        /* 2. 왼쪽 메뉴 영역 */
        .left-side { 
            padding: 40px; background: #ffffff; border-right: 1px solid #ddd; 
            overflow: hidden; position: relative; white-space: nowrap;
        }
        .btn-toggle {
            position: absolute; top: 20px; right: 20px;
            cursor: pointer; padding: 5px 10px; background: #ff3c78; color: white; border-radius: 5px;
        }
        
        .title { font-size: 20pt; font-weight: 800; margin-bottom: 30px; color: #1a1a1a; }
        .ui-item {
            padding: 15px; border-radius: 10px; margin-bottom: 12px;
            background: #f8f9fa; cursor: pointer; transition: 0.2s;
            border: 1px solid #eee;
        }
        .ui-item:hover, .ui-item.active { background: #fff1f5; border: 1px solid #ff3c78; }

        /* 3. 오른쪽 태블릿 영역 */
        .right-side { 
            display: flex; align-items: center; justify-content: center;
            padding: 40px; background-color: #e9ecef;
        }
        .tablet-frame {
            width: 100%; height: 100%;
            border: 15px solid #2d2d2d;
            border-radius: 30px;
            background: #fff;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .screen { width: 100%; height: 100%; border: none; }
        
        .empty-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #999; font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="container" id="container">
    <div class="left-side">
        <div class="btn-toggle" onclick="toggleMenu()">☰</div>
        <div class="title">UI Showcase</div>
        <div class="ui-list">
            <div class="ui-item" onclick="loadUI(this, 'https://example.com/demo1')">
                <h3>📱 펫프렌즈 홈 피드</h3>
            </div>
            <div class="ui-item" onclick="loadUI(this, 'https://example.com/demo2')">
                <h3>💳 토스 송금 화면</h3>
            </div>
        </div>
    </div>

    <div class="right-side">
        <div class="tablet-frame">
            <iframe id="frame" class="screen" src="about:blank"></iframe>
            <div id="msg" class="empty-msg">목록에서 UI를 선택하세요</div>
        </div>
    </div>
</div>

<script>
    function toggleMenu() {
        document.getElementById('container').classList.toggle('collapsed');
    }

    function loadUI(el, url) {
        document.querySelectorAll('.ui-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('msg').style.display = 'none';
        document.getElementById('frame').src = url;
    }
</script>
</body>
</html>
