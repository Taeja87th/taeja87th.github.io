<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>taeja87th | Tablet Showcase</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; height: 100vh; overflow: hidden; }

        .container {
            display: grid;
            grid-template-columns: 300px 1fr; /* 펼쳤을 때 */
            height: 100vh;
            transition: grid-template-columns 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .container.collapsed {
            grid-template-columns: 0px 1fr; /* 접었을 때 */
        }

        /* 1. 왼쪽 메뉴 */
        .left-side { 
            background: #ffffff; border-right: 1px solid #ddd; 
            overflow: hidden; /* 내용 찌그러짐 방지 */
            position: relative;
            display: flex; flex-direction: column;
        }
        
        /* 내용 컨테이너 (width를 고정하여 찌그러짐 차단) */
        .menu-content { width: 300px; padding: 40px; }

        .btn-toggle {
            position: absolute; top: 20px; right: -50px; /* 밖으로 빼냄 */
            cursor: pointer; padding: 10px; background: #ff3c78; color: white; border-radius: 0 5px 5px 0;
            z-index: 100;
        }
        
        .title { font-size: 20pt; font-weight: 800; margin-bottom: 30px; color: #1a1a1a; }
        .ui-item {
            padding: 15px; border-radius: 10px; margin-bottom: 12px;
            background: #f8f9fa; cursor: pointer; transition: 0.2s;
            border: 1px solid #eee;
        }
        .ui-item:hover, .ui-item.active { background: #fff1f5; border: 1px solid #ff3c78; }

        /* 2. 오른쪽 태블릿 영역 */
        .right-side { 
            display: flex; align-items: center; justify-content: center;
            padding: 40px; background-color: #e9ecef;
            overflow: hidden; /* 부모 영역 벗어남 방지 */
        }
        
        .tablet-frame {
            width: 100%; height: 100%;
            border: 15px solid #2d2d2d;
            border-radius: 30px;
            background: #fff;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            display: flex; flex-direction: column;
        }
        
        .screen { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="container" id="container">
    <div class="left-side">
        <div class="btn-toggle" onclick="toggleMenu()">☰</div>
        <div class="menu-content">
            <div class="title">UI Showcase</div>
            <div class="ui-list">
                <div class="ui-item" onclick="loadUI(this, 'https://example.com/demo1')"><h3>📱 펫프렌즈 홈 피드</h3></div>
                <div class="ui-item" onclick="loadUI(this, 'https://example.com/demo2')"><h3>💳 토스 송금 화면</h3></div>
            </div>
        </div>
    </div>

    <div class="right-side">
        <div class="tablet-frame">
            <iframe id="frame" class="screen" src="about:blank"></iframe>
        </div>
    </div>
</div>

<script>
    function toggleMenu() {
        document.getElementById('container').classList.toggle('collapsed');
    }

    function loadUI(el, url) {
        document.querySelectorAll('.ui-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('frame').src = url;
    }
</script>
</body>
</html>
