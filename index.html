<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>taeja87th | Tablet Showcase</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; height: 100vh; overflow: hidden; }

        /* 1. 그리드 레이아웃 (4:6 비율) */
        .container {
            display: grid;
            grid-template-columns: 4fr 6fr;
            height: 100vh;
        }

        /* 2. 왼쪽 메뉴 영역 */
        .left-side { padding: 50px; background: #ffffff; border-right: 1px solid #e0e0e0; overflow-y: auto; }
        .title { font-size: 24pt; font-weight: 800; margin-bottom: 40px; color: #1a1a1a; }
        .ui-item {
            padding: 20px; border-radius: 12px; margin-bottom: 15px;
            background: #f8f9fa; cursor: pointer; transition: 0.3s;
            border: 2px solid transparent;
        }
        .ui-item:hover, .ui-item.active { background: #fff1f5; border: 2px solid #ff3c78; }

        /* 3. 오른쪽 태블릿 영역 */
        .right-side { 
            display: flex; align-items: center; justify-content: center;
            background-color: #e9ecef;
        }
        
        /* 가로형 태블릿 프레임 */
        .tablet-frame {
            width: 700px; height: 450px; /* 가로가 긴 비율 */
            border: 15px solid #2d2d2d;
            border-radius: 30px;
            background: #fff;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .screen { width: 100%; height: 100%; border: none; }
        
        .empty-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #999; font-size: 14pt;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-side">
        <div class="title">UI Showcase</div>
        <div class="ui-list">
            <div class="ui-item" onclick="loadUI(this, 'https://example.com/demo1')">
                <h3>펫프렌즈 홈 피드</h3>
                <p>Jetpack Compose 스크롤 구현</p>
            </div>
            <div class="ui-item" onclick="loadUI(this, 'https://example.com/demo2')">
                <h3>토스 송금 화면</h3>
                <p>커스텀 키패드 및 애니메이션</p>
            </div>
        </div>
    </div>

    <div class="right-side">
        <div class="tablet-frame">
            <iframe id="frame" class="screen" src="about:blank"></iframe>
            <div id="msg" class="empty-msg">프로젝트를 선택하세요</div>
        </div>
    </div>
</div>

<script>
    function loadUI(el, url) {
        document.querySelectorAll('.ui-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('msg').style.display = 'none';
        document.getElementById('frame').src = url;
    }
</script>
</body>
</html>
